services:
  trading-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cryptoalgo-bot
    restart: unless-stopped

    # Load API keys and config from .env file
    env_file:
      - .env

    # Persist logs outside the container
    volumes:
      - ./logs:/app/logs

    # Resource limits (trading bot is lightweight)
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M

    # Healthcheck: verify Python process is alive
    healthcheck:
      test: [ "CMD", "python3", "-c", "import sys; sys.exit(0)" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
